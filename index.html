<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Mes Splats 3D</title>
    <style>
        /* RESET & BASE */
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        /* CONTENEUR PRINCIPAL */
        #ui {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 20px; 
            align-items: center;
        }

        /* BOÎTES DE L'INTERFACE (Glassmorphism) */
        .btn-group, .slider-container {
            display: flex;
            background: rgba(15, 23, 42, 0.65); /* Bleu nuit profond et transparent */
            border-radius: 14px;
            backdrop-filter: blur(12px); /* Effet verre dépoli plus fort */
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); /* Ombre portée pour la profondeur */
        }

        .btn-group {
            gap: 6px;
            padding: 6px;
        }

        .slider-container {
            flex-direction: column;
            padding: 12px 18px;
            gap: 10px;
            transition: all 0.3s ease;
        }

        /* BOUTONS STANDARDS */
        .btn {
            padding: 10px 18px;
            border: 1px solid transparent;
            border-radius: 8px;
            background: transparent;
            color: #94a3b8; /* Gris bleuté clair */
            font-family: inherit;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }

        /* BOUTON ACTIF (Intuitivité) */
        .btn.active {
            background: rgba(14, 165, 233, 0.2); /* Fond bleu cyan transparent */
            color: #38bdf8; /* Texte bleu cyan */
            border-color: rgba(56, 189, 248, 0.4);
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.1) inset;
        }

        /* MENU DÉROULANT */
        select.btn {
            appearance: none;
            outline: none;
            padding-right: 35px;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2394a3b8%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 12px top 50%;
            background-size: 10px auto;
        }
        
        select.btn:hover {
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23ffffff%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
        }

        select.btn option {
            background: #1e293b;
            color: #fff;
            padding: 10px;
        }

        /* SLIDER & TEXTES */
        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .slider-header label {
            color: #94a3b8;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #speed-value {
            color: #38bdf8;
            font-family: monospace;
            font-size: 13px;
            font-weight: bold;
            background: rgba(0,0,0,0.4);
            padding: 3px 8px;
            border-radius: 6px;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        input[type=range] {
            width: 140px;
            cursor: pointer;
            accent-color: #38bdf8;
            margin: 0;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            -webkit-appearance: none;
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: #38bdf8;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        /* ÉCRAN DE CHARGEMENT */
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, rgba(15,23,42,0.8) 0%, rgba(0,0,0,0.95) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            transition: opacity 0.6s ease;
        }

        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #loading-text {
            color: #38bdf8;
            font-weight: 600;
            font-size: 18px;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; text-shadow: 0 0 15px rgba(56, 189, 248, 0.6); }
            100% { opacity: 0.6; }
        }
    </style>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.179.0/build/three.module.js",
            "three/examples/jsm/": "https://unpkg.com/three@0.179.0/examples/jsm/",
            "@sparkjsdev/spark": "https://unpkg.com/@sparkjsdev/spark@latest/dist/spark.module.js"
        }
    }
    </script>
</head>
<body>

    <div id="ui">
        <div class="btn-group">
            <select id="model-selector" class="btn" title="Choisir un modèle">
                <option>Chargement...</option>
            </select>
        </div>

        <div class="btn-group">
            <button id="btn-orbit" class="btn active">Orbite</button>
            <button id="btn-free" class="btn">Libre</button>
        </div>
        
        <div class="slider-container" id="speed-container">
            <div class="slider-header">
                <label for="speed-slider">Vitesse</label>
                <span id="speed-value">0.10</span> 
            </div>
            <input type="range" id="speed-slider" min="-1" max="1" step="0.01" value="0.1">
        </div>
    </div>

    <div id="loading-overlay">
        <span id="loading-text">Chargement du Splat...</span>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
